version: '3.8'\n\nservices:\n  db:\n    image: postgres:16\n    container_name: seo_db\n    environment:\n      POSTGRES_DB: seo_saas\n      POSTGRES_USER: seo_admin\n      POSTGRES_PASSWORD: ${DB_PASSWORD:-seo_password}\n    volumes:\n      - postgres_data:/var/lib/postgresql/data\n    ports:\n      - \"5432:5432\"\n    healthcheck:\n      test: [\"CMD-SHELL\", \"pg_isready -U seo_admin\"]\n      interval: 10s\n      timeout: 5s\n      retries: 5\n\n  redis:\n    image: redis:7-alpine\n    container_name: seo_redis\n    ports:\n      - \"6379:6379\"\n    volumes:\n      - redis_data:/data\n    healthcheck:\n      test: [\"CMD\", \"redis-cli\", \"ping\"]\n      interval: 10s\n      timeout: 5s\n      retries: 5\n\n  backend:\n    build: ./backend\n    container_name: seo_backend\n    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4\n    volumes:\n      - ./backend:/app\n      - static_volume:/app/staticfiles\n    ports:\n      - \"8000:8000\"\n    environment:\n      DEBUG: ${DEBUG:-False}\n      SECRET_KEY: ${SECRET_KEY:-your-secret-key}\n      DB_ENGINE: django.db.backends.postgresql\n      DB_NAME: seo_saas\n      DB_USER: seo_admin\n      DB_PASSWORD: ${DB_PASSWORD:-seo_password}\n      DB_HOST: db\n      DB_PORT: 5432\n      CELERY_BROKER_URL: redis://redis:6379/0\n      OPENAI_API_KEY: ${OPENAI_API_KEY}\n      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}\n    depends_on:\n      db:\n        condition: service_healthy\n      redis:\n        condition: service_healthy\n\n  celery:\n    build: ./backend\n    container_name: seo_celery\n    command: celery -A config worker -l info\n    volumes:\n      - ./backend:/app\n    environment:\n      DEBUG: ${DEBUG:-False}\n      SECRET_KEY: ${SECRET_KEY:-your-secret-key}\n      DB_ENGINE: django.db.backends.postgresql\n      DB_NAME: seo_saas\n      DB_USER: seo_admin\n      DB_PASSWORD: ${DB_PASSWORD:-seo_password}\n      DB_HOST: db\n      DB_PORT: 5432\n      CELERY_BROKER_URL: redis://redis:6379/0\n      OPENAI_API_KEY: ${OPENAI_API_KEY}\n    depends_on:\n      - backend\n      - redis\n      - db\n\n  frontend:\n    build: ./frontend\n    container_name: seo_frontend\n    ports:\n      - \"3000:3000\"\n    volumes:\n      - ./frontend:/app\n      - /app/node_modules\n    environment:\n      NEXT_PUBLIC_API_URL: http://localhost:8000\n    depends_on:\n      - backend\n\n  nginx:\n    image: nginx:alpine\n    container_name: seo_nginx\n    ports:\n      - \"80:80\"\n      - \"443:443\"\n    volumes:\n      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro\n      - static_volume:/app/staticfiles:ro\n    depends_on:\n      - backend\n      - frontend\n\nvolumes:\n  postgres_data:\n  redis_data:\n  static_volume:\n